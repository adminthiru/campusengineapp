name: skl_teacher
description: SKL School Management — Teacher Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Navigation ─────────────────────────────────────────────────────
  go_router: ^14.6.3

  # ── State Management ────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Dependency Injection ────────────────────────────────────────────
  get_it: ^8.0.3

  # ── Network ─────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # ── Secure Storage ──────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.4

  # ── Local Cache / Offline ───────────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── JSON Serialization ──────────────────────────────────────────────
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # ── Font (Inter — matches web app) ──────────────────────────────────
  google_fonts: ^6.2.1

  # ── UI / Animations ─────────────────────────────────────────────────
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.1

  # ── Date & Calendar ─────────────────────────────────────────────────
  intl: ^0.19.0
  table_calendar: ^3.1.3

  # ── Charts (Dashboard / Reports) ─────────────────────────────────────
  fl_chart: ^0.70.2

  # ── Image ────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # ── QR Code ─────────────────────────────────────────────────────────
  qr_flutter: ^4.1.0

  # ── Toasts & Dialogs ────────────────────────────────────────────────
  fluttertoast: ^8.2.12

  # ── Functional Error Handling (Either) ──────────────────────────────
  dartz: ^0.10.1
  equatable: ^2.0.7

  # ── Utilities ───────────────────────────────────────────────────────
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0

  # ── Logging ─────────────────────────────────────────────────────────
  logger: ^2.5.0

  # ── Icons ───────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  file_picker: ^11.0.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.9.2
  freezed: ^2.5.7
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # ── Assets ───────────────────────────────────────────────────────────
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # ── Fonts: Inter (loaded via google_fonts at runtime) ────────────────
  # No need to bundle — google_fonts fetches & caches Inter automatically.
  # For offline/production: add font files here instead.
